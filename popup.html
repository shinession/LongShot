<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Longshot Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">Chrome Extension</p>
      <h1>Longshot Capture</h1>
      <p class="intro">
        Capture the current page by scrolling the viewport, then stitch every frame into one long PNG.
      </p>

      <button id="captureButton" class="capture-button" type="button">
        Capture full page
      </button>

      <p id="status" class="status" aria-live="polite">
        Ready.
      </p>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
