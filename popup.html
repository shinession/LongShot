<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Longshot Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">Chrome Extension</p>
      <h1>Longshot Capture</h1>
      <p class="intro">
        Capture the current page by scrolling the viewport, then stitch every frame into one long image.
      </p>

      <div class="format-row">
        <label class="format-label">Format</label>
        <div class="format-options">
          <button class="format-btn active" data-format="png" type="button">
            <span class="format-btn-title">PNG</span>
            <span class="format-btn-meta">One long image file</span>
          </button>
          <button class="format-btn" data-format="pdf-single" type="button">
            <span class="format-btn-title">PDF Single Page</span>
            <span class="format-btn-meta">One continuous tall page</span>
          </button>
          <button class="format-btn" data-format="pdf-multi" type="button">
            <span class="format-btn-title">PDF Multi Page</span>
            <span class="format-btn-meta">Split into standard pages</span>
          </button>
        </div>
      </div>

      <label class="capture-toggle" for="disableJsToggle">
        <input id="disableJsToggle" class="capture-toggle-input" type="checkbox" unchecked />
        <span class="capture-toggle-body">
          <span class="capture-toggle-title">Disable page JS while capturing</span>
          <span class="capture-toggle-meta">Experimental function.</span>
        </span>
      </label>

      <button id="captureButton" class="capture-button" type="button">
        Capture full page
      </button>

      <p id="status" class="status" aria-live="polite">
        Ready.
      </p>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
